<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conquest — Territory War</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#111;--surface:#1a1a1a;--border:#2a2a2a;--text:#eee;--dim:#666;--gold:#f0c030;--red:#e04040;--blue:#4080e0;--green:#40b060;--purple:#8050c0;--cyan:#30b0b0;--orange:#e08030;--r:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow:hidden}
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:20px}.screen.active{display:flex}
#menu{background:radial-gradient(ellipse at 50% 40%,#1a1a10,#111)}
.logo{font-family:'Fredoka One',cursive;font-size:3rem;color:var(--gold);text-shadow:0 3px 0 #a07010,0 0 30px rgba(240,192,48,.15);margin-bottom:4px}
.sub{color:var(--dim);font-size:.85rem;margin-bottom:28px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:380px;width:100%}
.sc h2{font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--gold);margin-bottom:14px;text-align:center}
.fg{margin-bottom:12px}.fg label{display:block;font-size:.68rem;color:var(--dim);margin-bottom:3px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.fg input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:.9rem;outline:none;font-family:'Nunito',sans-serif}.fg input:focus{border-color:var(--gold)}
.btn{padding:10px 20px;border:none;border-radius:var(--r);font-family:'Fredoka One',cursive;font-size:.88rem;cursor:pointer;transition:all .15s;letter-spacing:.5px}
.btn-gold{background:var(--gold);color:#111}.btn-gold:hover{filter:brightness(1.1)}
.btn-dark{background:var(--border);color:var(--text)}
.bk{width:100%}.bs{padding:7px 14px;font-size:.78rem}
.dv{text-align:center;color:var(--dim);margin:14px 0;font-size:.78rem}
.room-code{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--gold);letter-spacing:6px;margin:8px 0;padding:8px;background:var(--bg);border-radius:var(--r);border:2px dashed var(--gold);text-align:center}
.plist{list-style:none;margin:10px 0}.plist li{padding:6px 10px;background:var(--bg);border-radius:var(--r);margin-bottom:4px;font-weight:600;font-size:.82rem;display:flex;align-items:center;gap:6px}
.pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* GAME */
#game{padding:0;flex-direction:row;align-items:stretch;min-height:100vh}
canvas{flex:1;display:block}
.hud{position:fixed;top:10px;left:10px;z-index:10;display:flex;flex-direction:column;gap:5px}
.hud-box{background:rgba(0,0,0,.7);padding:8px 12px;border-radius:8px;font-size:.78rem;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.08)}
.hud-box .label{color:var(--dim);font-size:.65rem;text-transform:uppercase;letter-spacing:.5px}
.hud-box .val{font-family:'Fredoka One',cursive;font-size:1.1rem}
.gold-val{color:var(--gold)}.troop-val{color:var(--green)}.hp-val{color:var(--red)}

.shop{position:fixed;top:10px;right:10px;z-index:10;background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px;backdrop-filter:blur(4px);max-width:200px;display:none}
.shop h3{font-family:'Fredoka One',cursive;font-size:.85rem;color:var(--gold);margin-bottom:6px}
.shop-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:.75rem;border-bottom:1px solid rgba(255,255,255,.05)}
.shop-item .cost{color:var(--gold);font-weight:700}
.shop-btn{padding:4px 10px;border:none;background:var(--gold);color:#111;border-radius:5px;font-size:.68rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
.shop-btn:disabled{opacity:.3;cursor:not-allowed}

.action-bar{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:10;display:none;background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:8px 14px;backdrop-filter:blur(4px);display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.action-bar .abtn{padding:6px 14px;border:none;border-radius:6px;font-family:'Fredoka One',cursive;font-size:.75rem;cursor:pointer;transition:all .1s}
.abtn:active{transform:scale(.95)}

.msg-box{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;background:rgba(0,0,0,.85);border:2px solid var(--gold);border-radius:14px;padding:20px;text-align:center;display:none;min-width:260px}
.msg-box h3{font-family:'Fredoka One',cursive;color:var(--gold);margin-bottom:8px}
.msg-box .fg{text-align:left}

.toast-box{position:fixed;top:50px;right:10px;z-index:200;display:flex;flex-direction:column;gap:4px}
.toast{padding:8px 12px;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);font-size:.78rem;font-weight:600;animation:si .3s}
@keyframes si{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>
<div id="menu" class="screen active">
<div class="logo">CONQUEST</div>
<div class="sub">Territory War — Conquer them all</div>
<div class="sc">
<h2>⚔️ Play</h2>
<div class="fg"><label>Your Name</label><input id="p-name" maxlength="12" placeholder="Enter name"></div>
<button class="btn btn-gold bk" onclick="createRoom()">Create Room</button>
<div class="dv">or join</div>
<div class="fg"><label>Room Code</label><input id="p-code" maxlength="5" placeholder="Code" style="text-transform:uppercase"></div>
<button class="btn btn-dark bk" onclick="joinRoom()">Join Room</button>
</div></div>

<div id="lobby" class="screen">
<div class="sc" style="text-align:center">
<h2>Waiting for Players</h2>
<div class="room-code" id="l-code">-----</div>
<ul class="plist" id="l-pl"></ul>
<p style="color:var(--dim);font-size:.8rem;margin-bottom:8px" id="l-st">Need 2+</p>
<button class="btn btn-gold bk" id="l-go" onclick="startGame()" style="display:none">Start Game ⚔️</button>
<button class="btn btn-dark bs" onclick="leaveRoom()" style="margin-top:8px">Leave</button>
</div></div>

<div id="game" class="screen">
<canvas id="cv"></canvas>
<div class="hud" id="hud" style="display:none">
<div class="hud-box"><div class="label">Gold</div><div class="val gold-val" id="h-gold">0</div></div>
<div class="hud-box"><div class="label">Troops</div><div class="val troop-val" id="h-troops">0</div></div>
<div class="hud-box"><div class="label">Health</div><div class="val hp-val" id="h-hp">100</div></div>
<div class="hud-box"><div class="label">Income</div><div class="val" style="color:var(--gold)" id="h-income">20g/s · 1t/s</div></div>
</div>
<div class="shop" id="shop">
<h3>🛒 Upgrades</h3>
<div id="shop-items"></div>
</div>
<div class="action-bar" id="abar">
<button class="abtn" style="background:var(--green);color:#111" onclick="deployMode()">Deploy (D)</button>
<button class="abtn" style="background:var(--blue);color:#fff" onclick="mergeMode()">Merge (M)</button>
<button class="abtn" style="background:var(--red);color:#fff" onclick="attackMode()">Attack (A)</button>
<button class="abtn" style="background:var(--gold);color:#111" onclick="toggleShop()">Shop (S)</button>
</div>
</div>

<div class="msg-box" id="msgbox"><h3 id="msg-title"></h3><div id="msg-body"></div></div>
<div class="toast-box" id="tb"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyASPNSXdFs2B3X8mbUq-nBYlgAIR7BSx6E",authDomain:"fortuna-64c00.firebaseapp.com",databaseURL:"https://fortuna-64c00-default-rtdb.firebaseio.com",projectId:"fortuna-64c00",storageBucket:"fortuna-64c00.firebasestorage.app",messagingSenderId:"329218105683",appId:"1:329218105683:web:6b16fd2b1091531e4481a6"});
const db=firebase.database(),RT='conquest';
const cv=document.getElementById('cv'),cx=cv.getContext('2d');
const PC=['#e04040','#4080e0','#40b060','#e0a020','#8050c0','#30b0b0'];
const TILE=120,SPEED=3,HP_PER_TROOP=50;

let myId=null,roomId=null,roomRef=null,isHost=false,ls=[];
let GS=null,joined=false;
let keys={up:false,down:false,left:false,right:false};
let mode=null; // null,'deploy','merge','attack'
let goldTimer=null,troopTimer=null;

function sh(id){document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');s.style.display='none'});const e=document.getElementById(id);e.classList.add('active');e.style.display=id==='game'?'flex':'flex'}
function gc(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let r='';for(let i=0;i<5;i++)r+=c[~~(Math.random()*c.length)];return r}
function DC(o){return JSON.parse(JSON.stringify(o))}
function resize(){cv.width=innerWidth;cv.height=innerHeight}
addEventListener('resize',resize);resize();

// ═══ ROOM ═══
async function createRoom(){
  const name=document.getElementById('p-name').value.trim()||'Player';
  myId='c_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
  roomId=gc();roomRef=db.ref(RT+'/'+roomId);
  await roomRef.set({code:roomId,host:myId,status:'waiting',players:{}});
  await roomRef.child('players/'+myId).set({name,idx:0});
  isHost=true;setupLobby();
}
async function joinRoom(){
  const name=document.getElementById('p-name').value.trim()||'Player';
  const code=document.getElementById('p-code').value.trim().toUpperCase();
  if(!code)return toast('Enter code');
  roomRef=db.ref(RT+'/'+code);const snap=await roomRef.once('value');
  if(!snap.exists())return toast('Not found');const d=snap.val();
  if(d.status!=='waiting')return toast('Started');
  const pc=Object.keys(d.players||{}).length;if(pc>=6)return toast('Full');
  myId='c_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);roomId=code;
  await roomRef.child('players/'+myId).set({name,idx:pc});
  isHost=false;setupLobby();
}
function setupLobby(){
  document.getElementById('l-code').textContent=roomId;sh('lobby');
  const plR=roomRef.child('players'),stR=roomRef.child('status');
  const onP=plR.on('value',snap=>{
    const pl=snap.val()||{},li=document.getElementById('l-pl');li.innerHTML='';
    Object.entries(pl).sort((a,b)=>a[1].idx-b[1].idx).forEach(([id,p],i)=>{
      const l=document.createElement('li');l.innerHTML=`<span class="pdot" style="background:${PC[i]}"></span>${p.name}${id===myId?' (You)':''}`;li.appendChild(l)});
    const n=Object.keys(pl).length;
    document.getElementById('l-st').textContent=n>=2?n+' players':'Need 2+';
    document.getElementById('l-go').style.display=(n>=2&&isHost)?'block':'none';
  });ls.push(()=>plR.off('value',onP));
  const onS=stR.on('value',snap=>{if(snap.val()==='playing')initGame()});
  ls.push(()=>stR.off('value',onS));
}
function leaveRoom(){if(roomRef&&myId)roomRef.child('players/'+myId).remove();ls.forEach(f=>f());ls=[];sh('menu')}

// ═══ START ═══
async function startGame(){
  if(!isHost)return;
  const snap=await roomRef.child('players').once('value');
  const pl=snap.val(),ids=Object.keys(pl).sort((a,b)=>pl[a].idx-pl[b].idx);
  const n=ids.length;
  // Create grid: enough squares for each player + some neutral
  const gridSize=Math.max(3,Math.ceil(Math.sqrt(n*3)));
  const grid={};
  // Assign spawn squares
  const spawns=[];
  for(let i=0;i<n;i++){
    let r,c;
    do{r=~~(Math.random()*gridSize);c=~~(Math.random()*gridSize)}while(spawns.some(s=>s.r===r&&s.c===c));
    spawns.push({r,c});
    grid[r+'_'+c]={owner:ids[i],troops:0,armies:[]};
  }
  // Fill remaining as neutral
  for(let r=0;r<gridSize;r++)for(let c=0;c<gridSize;c++){
    if(!grid[r+'_'+c])grid[r+'_'+c]={owner:null,troops:0,armies:[]};
  }
  const pd={};
  ids.forEach((id,i)=>{
    const sp=spawns[i];
    pd[id]={name:pl[id].name,idx:i,color:PC[i],gold:100,troops:5,hp:100,
      x:sp.c*TILE+TILE/2,y:sp.r*TILE+TILE/2,spawn:sp.r+'_'+sp.c,alive:true,
      goldRate:20,troopRate:1,capProgress:0,capTarget:null,
      upgrades:{goldLv:0,troopLv:0}};
  });
  const gs={order:ids,pd,grid,gridSize,status:'playing'};
  await roomRef.update({status:'playing',gs});
}

// ═══ INIT GAME ═══
function initGame(){
  sh('game');resize();
  document.getElementById('hud').style.display='flex';
  document.getElementById('abar').style.display='flex';
  const gsR=roomRef.child('gs');
  const on=gsR.on('value',snap=>{GS=snap.val();if(GS)render()});
  ls.push(()=>gsR.off('value',on));
  // Income timers
  clearInterval(goldTimer);clearInterval(troopTimer);
  goldTimer=setInterval(()=>{
    if(!GS||!GS.pd[myId]||!GS.pd[myId].alive)return;
    const gs=DC(GS),p=gs.pd[myId];
    // Count owned territories for bonus
    const owned=Object.values(gs.grid).filter(t=>t.owner===myId).length;
    p.gold+=p.goldRate+owned*5;
    p.troops+=p.troopRate;
    roomRef.child('gs/pd/'+myId).update({gold:p.gold,troops:p.troops});
  },1000);
  requestAnimationFrame(gameLoop);
}

// ═══ INPUT ═══
addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='w'||e.key==='W'||e.key==='ArrowUp')keys.up=true;
  if(e.key==='s'||e.key==='S'||e.key==='ArrowDown')keys.down=true;
  if(e.key==='a'||e.key==='A'||e.key==='ArrowLeft')keys.left=true;
  if(e.key==='d'||e.key==='D'||e.key==='ArrowRight')keys.right=true;
  if(e.key==='u'||e.key==='U')startCapture();
  if(e.key==='Escape'){mode=null;hideMsg()}
});
addEventListener('keyup',e=>{
  if(e.key==='w'||e.key==='W'||e.key==='ArrowUp')keys.up=false;
  if(e.key==='s'||e.key==='S'||e.key==='ArrowDown')keys.down=false;
  if(e.key==='a'||e.key==='A'||e.key==='ArrowLeft')keys.left=false;
  if(e.key==='d'||e.key==='D'||e.key==='ArrowRight')keys.right=false;
  if(e.key==='u'||e.key==='U')stopCapture();
});

// Canvas click for deploy/merge
cv.addEventListener('click',e=>{
  if(!GS||!mode)return;
  const p=GS.pd[myId];if(!p)return;
  const rect=cv.getBoundingClientRect();
  const mx=e.clientX-rect.left,my2=e.clientY-rect.top;
  // Convert to world coords
  const camX=p.x-cv.width/2,camY=p.y-cv.height/2;
  const wx=mx+camX,wy=my2+camY;
  const gr=~~(wy/TILE),gc2=~~(wx/TILE);
  const key=gr+'_'+gc2;
  const tile=GS.grid[key];
  if(!tile)return;

  if(mode==='deploy'){
    if(tile.owner!==myId)return toast('Not your territory');
    const amt=parseInt(prompt('Deploy how many troops? (Have: '+p.troops+')'))||0;
    if(amt<1||amt>p.troops)return toast('Invalid amount');
    const gs=DC(GS);
    gs.pd[myId].troops-=amt;
    gs.grid[key].troops+=amt;
    roomRef.child('gs').set(gs);
    mode=null;toast('Deployed '+amt+' troops');
  }else if(mode==='merge'){
    if(tile.owner!==myId)return toast('Not your territory');
    if(tile.troops<2)return toast('Need 2+ troops to merge');
    const amt=parseInt(prompt('Merge how many troops into an army? (Available: '+tile.troops+')'))||0;
    if(amt<2||amt>tile.troops)return toast('Invalid');
    const gs=DC(GS);
    gs.grid[key].troops-=amt;
    if(!gs.grid[key].armies)gs.grid[key].armies=[];
    gs.grid[key].armies.push({size:amt,hp:amt*HP_PER_TROOP});
    roomRef.child('gs').set(gs);
    mode=null;toast('Merged '+amt+' into army (HP: '+(amt*HP_PER_TROOP)+')');
  }else if(mode==='attack'){
    // Must be neighboring my territory
    const myTiles=Object.entries(GS.grid).filter(([k,t])=>t.owner===myId).map(([k])=>k);
    const neighbors=getNeighbors(key,GS.gridSize);
    const isNeighbor=neighbors.some(n=>myTiles.includes(n));
    if(!isNeighbor&&tile.owner!==myId)return toast('Must attack neighboring territory');
    if(tile.owner===myId)return toast("That's yours!");
    // Pick which of your tiles to attack from
    const fromTiles=myTiles.filter(k=>getNeighbors(k,GS.gridSize).includes(key));
    if(!fromTiles.length)return toast('No adjacent territory');
    const from=fromTiles[0];
    const fromTile=GS.grid[from];
    const totalForce=(fromTile.troops||0)+((fromTile.armies||[]).reduce((s,a)=>s+a.size,0));
    if(totalForce<1)return toast('No troops to attack with');
    // Battle
    const gs=DC(GS);
    const attForce=(gs.grid[from].troops||0);
    const attArmies=(gs.grid[from].armies||[]).reduce((s,a)=>s+a.size,0);
    const attTotal=attForce+attArmies;
    const defForce=(gs.grid[key].troops||0);
    const defArmies=(gs.grid[key].armies||[]).reduce((s,a)=>s+a.size,0);
    const defTotal=defForce+defArmies;
    // Simple battle: higher force wins, loses troops equal to defender
    if(attTotal>defTotal){
      const remaining=attTotal-defTotal;
      gs.grid[key].owner=myId;
      gs.grid[key].troops=remaining;
      gs.grid[key].armies=[];
      gs.grid[from].troops=0;
      gs.grid[from].armies=[];
      toast('Victory! Conquered with '+remaining+' remaining');
    }else{
      const remaining=defTotal-attTotal;
      gs.grid[key].troops=remaining;
      gs.grid[key].armies=[];
      gs.grid[from].troops=0;
      gs.grid[from].armies=[];
      toast('Defeated! Enemy has '+remaining+' left');
    }
    roomRef.child('gs').set(gs);
    mode=null;
  }
});

function getNeighbors(key,size){
  const[r,c]=key.split('_').map(Number);
  const n=[];
  if(r>0)n.push((r-1)+'_'+c);
  if(r<size-1)n.push((r+1)+'_'+c);
  if(c>0)n.push(r+'_'+(c-1));
  if(c<size-1)n.push(r+'_'+(c+1));
  return n;
}

// ═══ MODES ═══
function deployMode(){mode='deploy';toast('Click YOUR territory to deploy troops')}
function mergeMode(){mode='merge';toast('Click YOUR territory to merge troops into army')}
function attackMode(){mode='attack';toast('Click ENEMY territory to attack')}
function toggleShop(){const s=document.getElementById('shop');s.style.display=s.style.display==='none'?'block':'none';renderShop()}

// ═══ SHOP ═══
function renderShop(){
  if(!GS||!GS.pd[myId])return;
  const p=GS.pd[myId];
  const items=[
    {name:'Gold Income +10/s',cost:200+p.upgrades.goldLv*150,key:'goldLv',effect:()=>{p.goldRate+=10}},
    {name:'Troop Rate +1/s',cost:500+p.upgrades.troopLv*400,key:'troopLv',effect:()=>{p.troopRate+=1}},
  ];
  document.getElementById('shop-items').innerHTML=items.map((it,i)=>
    `<div class="shop-item"><div>${it.name}<br><span class="cost">${it.cost} gold</span></div><button class="shop-btn" ${p.gold<it.cost?'disabled':''} onclick="buyUpgrade(${i})">Buy</button></div>`
  ).join('');
}
async function buyUpgrade(idx){
  if(!GS)return;const gs=DC(GS),p=gs.pd[myId];
  const items=[
    {cost:200+p.upgrades.goldLv*150,key:'goldLv',rate:'goldRate',add:10},
    {cost:500+p.upgrades.troopLv*400,key:'troopLv',rate:'troopRate',add:1},
  ];
  const it=items[idx];if(p.gold<it.cost)return toast('Not enough gold');
  p.gold-=it.cost;p.upgrades[it.key]++;p[it.rate]+=it.add;
  await roomRef.child('gs/pd/'+myId).set(p);
  toast('Upgraded!');renderShop();
}

// ═══ CAPTURE FLAG ═══
let capInterval=null,capCount=0;
function startCapture(){
  if(!GS||!GS.pd[myId])return;
  const p=GS.pd[myId];
  const gr=~~(p.y/TILE),gc2=~~(p.x/TILE),key=gr+'_'+gc2;
  const tile=GS.grid[key];
  if(!tile||tile.owner===myId)return;
  if(tile.troops>0||(tile.armies&&tile.armies.length))return toast('Clear troops first!');
  capCount=0;
  capInterval=setInterval(()=>{
    capCount++;
    toast('Capturing... '+capCount+'/10');
    if(capCount>=10){
      clearInterval(capInterval);capInterval=null;
      const gs=DC(GS);
      gs.grid[key].owner=myId;
      roomRef.child('gs').set(gs);
      toast('🏴 Territory captured!');
    }
  },1000);
}
function stopCapture(){if(capInterval){clearInterval(capInterval);capInterval=null;capCount=0}}

// ═══ MOVEMENT & GAME LOOP ═══
let lastSync=0;
function gameLoop(){
  if(!GS||!GS.pd[myId])return requestAnimationFrame(gameLoop);
  // Move
  const p=GS.pd[myId];
  let moved=false;
  if(keys.up){p.y-=SPEED;moved=true}
  if(keys.down){p.y+=SPEED;moved=true}
  if(keys.left){p.x-=SPEED;moved=true}
  if(keys.right){p.x+=SPEED;moved=true}
  // Clamp to world
  const ws=GS.gridSize*TILE;
  p.x=Math.max(8,Math.min(ws-8,p.x));
  p.y=Math.max(8,Math.min(ws-8,p.y));
  // Sync position
  if(moved&&Date.now()-lastSync>60){
    lastSync=Date.now();
    roomRef.child('gs/pd/'+myId+'/x').set(~~p.x);
    roomRef.child('gs/pd/'+myId+'/y').set(~~p.y);
  }
  draw();
  requestAnimationFrame(gameLoop);
}

// ═══ RENDER ═══
function render(){
  if(!GS||!GS.pd[myId])return;
  const p=GS.pd[myId];
  document.getElementById('h-gold').textContent=~~(p.gold);
  document.getElementById('h-troops').textContent=p.troops;
  document.getElementById('h-hp').textContent=p.hp+'/100';
  document.getElementById('h-income').textContent=p.goldRate+'g/s · '+p.troopRate+'t/s';
}

function draw(){
  if(!GS)return;
  const W=cv.width,H=cv.height;
  const me=GS.pd[myId];if(!me)return;
  const camX=me.x-W/2,camY=me.y-H/2;
  const gs=GS.gridSize;

  cx.fillStyle='#0a0a0a';cx.fillRect(0,0,W,H);

  // Draw grid
  for(let r=0;r<gs;r++)for(let c=0;c<gs;c++){
    const key=r+'_'+c;const tile=GS.grid[key];if(!tile)continue;
    const sx=c*TILE-camX,sy=r*TILE-camY;
    if(sx>W+TILE||sx<-TILE||sy>H+TILE||sy<-TILE)continue;

    // Territory color
    if(tile.owner){
      const owner=GS.pd[tile.owner];
      cx.fillStyle=owner?owner.color+'30':'#1a1a1a';
    }else cx.fillStyle='#111';
    cx.fillRect(sx,sy,TILE,TILE);

    // Border
    cx.strokeStyle='#222';cx.lineWidth=1;cx.strokeRect(sx,sy,TILE,TILE);

    // Owner highlight border
    if(tile.owner){
      const owner=GS.pd[tile.owner];
      cx.strokeStyle=(owner?.color||'#333')+'80';cx.lineWidth=2;cx.strokeRect(sx+1,sy+1,TILE-2,TILE-2);
    }

    // Flag
    if(tile.owner){
      cx.fillStyle=GS.pd[tile.owner]?.color||'#888';
      cx.fillRect(sx+TILE-20,sy+5,3,20);
      cx.beginPath();cx.moveTo(sx+TILE-17,sy+5);cx.lineTo(sx+TILE-5,sy+10);cx.lineTo(sx+TILE-17,sy+15);cx.fill();
    }

    // Troop count
    if(tile.troops>0){
      cx.font='bold 11px sans-serif';cx.textAlign='center';cx.fillStyle='#aaa';
      cx.fillText('⚔'+tile.troops,sx+TILE/2,sy+TILE-8);
    }
    // Armies
    if(tile.armies&&tile.armies.length){
      tile.armies.forEach((a,i)=>{
        cx.fillStyle=tile.owner?GS.pd[tile.owner]?.color||'#888':'#666';
        cx.fillRect(sx+8+i*22,sy+TILE-30,18,14);
        cx.fillStyle='#fff';cx.font='bold 8px sans-serif';cx.textAlign='center';
        cx.fillText(a.size,sx+17+i*22,sy+TILE-20);
      });
    }
  }

  // Draw all players
  GS.order.forEach(id=>{
    const p=GS.pd[id];if(!p||!p.alive)return;
    const px=p.x-camX,py=p.y-camY;
    if(px<-30||px>W+30||py<-30||py>H+30)return;

    // Body
    cx.fillStyle=p.color;
    cx.beginPath();cx.arc(px,py,12,0,Math.PI*2);cx.fill();
    if(id===myId){cx.strokeStyle='#fff';cx.lineWidth=2;cx.stroke()}

    // Eyes
    cx.fillStyle='#fff';
    cx.beginPath();cx.arc(px-4,py-3,3,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(px+4,py-3,3,0,Math.PI*2);cx.fill();
    cx.fillStyle='#111';
    cx.beginPath();cx.arc(px-3,py-2,1.5,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(px+5,py-2,1.5,0,Math.PI*2);cx.fill();

    // Name
    cx.font='bold 10px sans-serif';cx.textAlign='center';
    cx.fillStyle='rgba(0,0,0,.6)';
    const tw=cx.measureText(p.name).width;
    cx.fillRect(px-tw/2-4,py-24,tw+8,14);
    cx.fillStyle=id===myId?'#fff':'#aaa';
    cx.fillText(p.name,px,py-14);

    // HP bar
    cx.fillStyle='#333';cx.fillRect(px-15,py+16,30,4);
    cx.fillStyle=p.hp>50?'#40b060':p.hp>25?'#e0a020':'#e04040';
    cx.fillRect(px-15,py+16,30*(p.hp/100),4);
  });

  // Mode indicator
  if(mode){
    cx.font='bold 14px Fredoka One,sans-serif';cx.textAlign='center';
    cx.fillStyle='rgba(0,0,0,.6)';cx.fillRect(W/2-60,H-80,120,24);
    cx.fillStyle=mode==='deploy'?'#40b060':mode==='merge'?'#4080e0':'#e04040';
    cx.fillText(mode.toUpperCase()+' MODE',W/2,H-62);
  }

  // Minimap
  const mm=80,mmX=W-mm-8,mmY=H-mm-8;
  cx.fillStyle='rgba(0,0,0,.5)';cx.fillRect(mmX,mmY,mm,mm);
  cx.strokeStyle='#222';cx.strokeRect(mmX,mmY,mm,mm);
  const ws=gs*TILE;
  for(let r=0;r<gs;r++)for(let c=0;c<gs;c++){
    const tile=GS.grid[r+'_'+c];if(!tile||!tile.owner)continue;
    cx.fillStyle=GS.pd[tile.owner]?.color||'#444';
    cx.fillRect(mmX+(c*TILE/ws)*mm,mmY+(r*TILE/ws)*mm,(TILE/ws)*mm,(TILE/ws)*mm);
  }
  cx.fillStyle='#fff';
  cx.fillRect(mmX+(me.x/ws)*mm-2,mmY+(me.y/ws)*mm-2,4,4);
}

function hideMsg(){document.getElementById('msgbox').style.display='none'}
function toast(m){const c=document.getElementById('tb'),t=document.createElement('div');t.className='toast';t.textContent=m;c.appendChild(t);setTimeout(()=>t.remove(),3000)}
</script>
